name: Quality Requirements Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/**'
              - 'init_db.py'
              - 'pytest.ini'
              - 'docs/testing.md'
              - 'docs/quality-requirements.md'
              - 'docs/quality-requirements-tests.md'
              - 'docs/definition-of-done.md'
              - '.github/workflows/quality-requirements-tests.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/quality-requirements-tests.yml'

  backend-quality-tests:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432

    env:
      DATABASE_URL: postgresql://postgres:admin@localhost:15432/postgres
      DB_HOST: localhost
      DB_PORT: 15432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: postgres
      PYTHONPATH: .

    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.10-${{ hashFiles('backend/requirements.txt') }}

      - name: Create virtualenv and install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r backend/requirements.txt

      - name: Add virtualenv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Run Backend Dependency Vulnerability Scan (Additional QA Check)
        run: |
          pip-audit

      - name: Run Backend Linting (Ruff)
        run: |
          ruff check backend/src scripts/ --ignore E741,F401,F811,E402,E401

      - name: Run Backend Formatting Check (Black)
        run: |
          black backend/src scripts/

      - name: Initialize Database
        run: |
          python init_db.py

      - name: Start FastAPI Application
        run: |
          uvicorn backend.src.main:app --port 8000 --host 0.0.0.0 &
          echo "Waiting for FastAPI to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8000/docs); do
            printf '.'
            sleep 1
          done
          echo "FastAPI is ready!"

      - name: Run Unit Tests
        run: |
          pytest scripts/Unit/ -m unit -q --cov=backend/src --cov-report=term-missing

      - name: Run Integration and Quality Requirement Tests
        run: |
          pytest scripts/Integration/ scripts/QualityRequirements/ \
            -m "integration or qrt" -q \
            --cov=backend/src --cov-append --cov-report=term-missing

      - name: Publish test summary
        if: always()
        run: |
          echo "### Backend test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit: \`pytest scripts/Unit/ -m unit\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Integration + QRT: \`pytest scripts/Integration/ scripts/QualityRequirements/ -m 'integration or qrt'\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- QRT-001 security, QRT-004 authorization, supplementary auth perf" >> "$GITHUB_STEP_SUMMARY"
          echo "See docs/testing.md and docs/quality-requirements-tests.md" >> "$GITHUB_STEP_SUMMARY"

  frontend-quality-check:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Run Frontend Dependency Audit (Additional QA Check)
        working-directory: ./frontend
        run: |
          npm audit --audit-level=high

      - name: Run Frontend Code Quality Verification (Lint)
        working-directory: ./frontend
        run: |
          npm run lint

      - name: Run Frontend Production Build Verification (Build)
        working-directory: ./frontend
        run: |
          npm run build

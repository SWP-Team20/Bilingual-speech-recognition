name: Quality Requirements Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/**'
              - 'init_db.py'
              - '.github/workflows/quality-requirements-tests.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/quality-requirements-tests.yml'

  backend-quality-tests:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432

    env:
      DATABASE_URL: postgresql://postgres:admin@localhost:15432/postgres
      DB_HOST: localhost
      DB_PORT: 15432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: postgres
      PYTHONPATH: .

    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx psycopg2-binary uvicorn fastapi pip-audit ruff black

      - name: Run Backend Dependency Vulnerability Scan (Additional QA Check)
        run: |
          pip-audit

      - name: Run Backend Linting (Ruff)
        run: |
          ruff check backend/src scripts/

      - name: Run Backend Formatting Check (Black)
        run: |
          black --check backend/src scripts/

      - name: Initialize Database
        run: |
          python init_db.py

      - name: Start FastAPI Application
        run: |
          uvicorn backend.src.main:app --port 8000 --host 0.0.0.0 &
          echo "Waiting for FastAPI to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8000/docs); do
            printf '.'
            sleep 1
          done
          echo "FastAPI is ready!"

      - name: Run All Automated Tests with Line Coverage (Unit, Integration, QRT)
        run: |
          pytest --cov=backend/src scripts/ --cov-report=term-missing

  frontend-quality-check:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Run Frontend Dependency Audit (Additional QA Check)
        working-directory: ./frontend
        run: |
          npm audit --audit-level=high

      - name: Run Frontend Code Quality Verification (Lint)
        working-directory: ./frontend
        run: |
          npm run lint

      - name: Run Frontend Production Build Verification (Build)
        working-directory: ./frontend
        run: |
          npm run build

name: Quality Requirements Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-quality-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432

    env:
      DATABASE_URL: postgresql://postgres:admin@localhost:15432/postgres
      DB_HOST: localhost
      DB_PORT: 15432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: postgres
      PYTHONPATH: .

    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx psycopg2-binary uvicorn fastapi

      - name: Initialize Database
        run: |
          python init_db.py

      - name: Start FastAPI Application
        run: |
          uvicorn backend.src.main:app --port 8000 --host 0.0.0.0 &
          echo "Waiting for FastAPI to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8000/docs); do
            printf '.'
            sleep 1
          done
          echo "FastAPI is ready!"

      - name: Run Unauthorized Audio Access Quality Test (QRT-001)
        run: |
          pytest scripts/test_security.py          

      - name: Run Transcription Quality Test (QRT-002)
        run: |
          python scripts/transcription_quality_test.py

  frontend-quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Run Frontend Code Quality Verification (QRT-003 - Lint)
        working-directory: ./frontend
        run: |
          npm run lint

      - name: Run Frontend Production Build Verification (QRT-003 - Build)
        working-directory: ./frontend
        run: |
          npm run build

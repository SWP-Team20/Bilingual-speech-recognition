name: Quality Requirements Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality-requirements-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db

    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          apt update && apt install python3-venv -y
          python3 -m venv venv
          source venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Initialize Database (Create Admin)
        run: |
          python init_db.py

      - name: Start FastAPI Application
        run: |
          uvicorn backend.src.main:app --port 8000 --host 0.0.0.0 &
          echo "Waiting for FastAPI to start..."
          until $(curl --output /dev/null --silent --head --fail http://localhost:8000); do
            printf '.'
            sleep 1
          done
          echo "FastAPI is ready!"

      - name: Run Unauthorized Audio Access Quality Test (QRT-001)
        run: |
          pytest scripts/test_security.py          

      - name: Run Transcription Quality Test (QRT-002)
        run: |
          python scripts/transcription_quality_test.py
